<!DOCTYPE html>
<html>
<head>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        nav {
            background: #2c3e50;
            padding: 15px;
        }

        nav a {
            color: white;
            margin-right: 20px;

        }

            border-radius: 8px;
        }

<body>

<nav>
    <a href="/">Dashboard</a>
    <a href="/company">Company</a>
    <a href="/customers">Customers</a>

</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
